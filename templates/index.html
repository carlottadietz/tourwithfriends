<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Neue Website</title>
  <link rel="stylesheet" href="https://unpkg.com/modern-css-reset/dist/reset.min.css">
  <style>
    body { font-family: Inter, system-ui, sans-serif; min-height: 100vh; display: grid; place-items: center; background: linear-gradient(135deg, #0f172a, #1e293b); color: white; margin: 0; }
    .card { max-width: 720px; width: 100%; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.16); border-radius: 28px; padding: 40px; box-shadow: 0 32px 80px rgba(0,0,0,0.35); }
    h1 { margin-top: 0; font-size: clamp(2.5rem, 5vw, 4rem); }
    p { color: #cbd5e1; font-size: 1.05rem; line-height: 1.8; }
    .button { display: inline-flex; align-items: center; justify-content: center; gap: 10px; padding: 14px 22px; background: #facc15; color: #0f172a; font-weight: 800; border-radius: 999px; text-decoration: none; border: none; cursor: pointer; margin-top: 24px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Willkommen zu deiner neuen Website</h1>
    <p>Dies ist der Startpunkt für dein neues Projekt. Du kannst hier später beliebige Inhalte, Uploads und Challenge-Features hinzufügen.</p>
    <a class="button" href="https://render.com">Deploy mit Render</a>
  </div>
</body>
</html>
